name: Build iOSScreenStream

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FINALPACKAGE: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
  THEOS_DEVICE_IP: 127.0.0.1
  THEOS_DEVICE_PORT: 58422

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcbeautify ldid-procursus p7zip make

      - name: Checkout Theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos
          submodules: recursive

      - name: Checkout TrollVNC (for STHIDEventGenerator)
        uses: actions/checkout@v4
        with:
          repository: hogan-hong/TrollVNC
          path: trollvnc
          sparse-checkout: |
            src/STHIDEventGenerator.h
            src/STHIDEventGenerator.mm
            include-spi
            include

      - name: Copy TrollVNC headers and source
        run: |
          mkdir -p theos/include/TrollVNC
          mkdir -p tweak/include
          mkdir -p tweak/src
          cp trollvnc/src/STHIDEventGenerator.h theos/include/TrollVNC/
          cp -r trollvnc/include/* theos/include/ 2>/dev/null || true
          cp -r trollvnc/include-spi/* theos/include/ 2>/dev/null || true
          cp trollvnc/src/STHIDEventGenerator.h tweak/include/
          cp trollvnc/src/STHIDEventGenerator.mm tweak/src/

      - name: Install iOS SDKs
        run: |
          cd theos
          ./bin/install-sdk iPhoneOS16.5 || echo "SDK 16.5 failed"
          ./bin/install-sdk iPhoneOS14.5 || echo "SDK 14.5 failed"
          ls -la sdks/ 2>/dev/null || echo "No sdks dir"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Build package
        run: |
          cd tweak
          pwd
          ls -la
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "THEOS=$THEOS"
          echo "Checking Theos structure..."
          ls -la $THEOS/
          ls -la $THEOS/makefiles/ 2>/dev/null | head -10
          ls -la $THEOS/sdks/ 2>/dev/null || echo "No SDKs"
          echo "Starting build..."
          gmake package 2>&1 | tee ../build.log
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cd tweak
          if [ -d "packages" ]; then
            cp packages/*.deb ../artifacts/ 2>/dev/null && echo "Copied deb" || echo "No deb found"
          fi
          cd ..
          if [ -f "build.log" ]; then
            cp build.log artifacts/
          fi
          ls -la artifacts/

      - name: Upload package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOSScreenStream
          path: artifacts/**
          if-no-files-found: warn

  release:
    if: github.event_name == 'workflow_dispatch' && needs.build.result == 'success'
    needs: build
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: iOSScreenStream
          path: release-packages

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.sha }}
          name: iOSScreenStream Build
          body: |
            Automated build from GitHub Actions
            Built commit: ${{ github.sha }}
          files: release-packages/**/*
          draft: false
          prerelease: true
