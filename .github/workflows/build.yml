name: 构建 iOSScreenStream

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FINALPACKAGE: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
  THEOS_DEVICE_IP: 127.0.0.1
  THEOS_DEVICE_PORT: 58422

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          brew install xcbeautify ldid-procursus p7zip make

      - name: 检出 Theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos
          submodules: recursive

      - name: 检出 TrollVNC（获取 STHIDEventGenerator 头文件）
        uses: actions/checkout@v4
        with:
          repository: hogan-hong/TrollVNC
          path: trollvnc

      - name: 复制 TrollVNC 头文件和源码
        run: |
          mkdir -p theos/include/TrollVNC
          mkdir -p tweak/include
          mkdir -p tweak/src
          cp trollvnc/src/STHIDEventGenerator.h theos/include/TrollVNC/
          cp trollvnc/src/Control.h theos/include/TrollVNC/ 2>/dev/null || true
          cp -r trollvnc/include/* theos/include/ 2>/dev/null || true
          cp -r trollvnc/include-spi/* theos/include/ 2>/dev/null || true
          cp trollvnc/src/STHIDEventGenerator.h tweak/include/
          cp trollvnc/src/STHIDEventGenerator.mm tweak/src/ 2>/dev/null || true
          cp trollvnc/src/Control.h tweak/src/ 2>/dev/null || true
          echo "TrollVNC 文件已复制"

      - name: 配置 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: 安装 iOS SDK
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          cd $THEOS
          ./bin/install-sdk iPhoneOS16.5 > /dev/null 2>&1 || echo "SDK 16.5 安装失败"
          ./bin/install-sdk iPhoneOS14.5 > /dev/null 2>&1 || echo "SDK 14.5 安装失败"
          ls -la sdks/ 2>/dev/null || echo "无 SDK 目录"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建大小写敏感的磁盘映像
        run: |
          # macOS APFS 默认不区分大小写，导致 Theos 生成的 info.plist 无法通过 cp Info.plist 修正大小写
          # 创建一个区分大小写的 APFS 卷来做构建，确保 deb 内文件名正确
          hdiutil create -size 2g -type SPARSE -fs "Case-sensitive APFS" -volname theos_build /tmp/theos_build.sparseimage
          hdiutil mount /tmp/theos_build.sparseimage
          echo "大小写敏感卷已挂载: /Volumes/theos_build"
          # 复制项目文件到该卷
          cp -R "$GITHUB_WORKSPACE/tweak" /Volumes/theos_build/tweak
          cp -R "$GITHUB_WORKSPACE/pc" /Volumes/theos_build/pc 2>/dev/null || true

      - name: 构建 deb 包
        run: |
          cd /Volumes/theos_build/tweak
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "开始构建（在大小写敏感卷上）..."
          gmake package 2>&1 | tee /Volumes/theos_build/build.log
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: 修复 deb 中的文件名大小写
        run: |
          DEB_FILE=$(ls /Volumes/theos_build/tweak/packages/*.deb 2>/dev/null | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "❌ 未找到 deb 包"
            exit 1
          fi
          echo "deb 包: $DEB_FILE"
          
          # 解压 deb，修正文件名，重新打包
          # Theos 始终生成小写 info.plist，必须在 case-sensitive 卷上修正
          REPACK_DIR="/tmp/deb_repack"
          rm -rf "$REPACK_DIR"
          dpkg-deb -R "$DEB_FILE" "$REPACK_DIR"
          
          BUNDLE_DIR="$REPACK_DIR/Library/PreferenceBundles/iOSScreenStreamPrefs.bundle"
          echo "===== 修正前 bundle 内容 ====="
          ls -la "$BUNDLE_DIR/" 2>/dev/null || echo "bundle 目录不存在"
          
          # 修正 info.plist → Info.plist（iOS NSBundle 区分大小写）
          if [ -f "$BUNDLE_DIR/info.plist" ]; then
            mv "$BUNDLE_DIR/info.plist" "$BUNDLE_DIR/Info.plist"
            echo "✅ 已修正 info.plist → Info.plist"
          elif [ -f "$BUNDLE_DIR/Info.plist" ]; then
            echo "✅ Info.plist 已是大写"
          else
            echo "⚠️ 未找到任何 info/Info.plist"
          fi
          
          echo "===== 修正后 bundle 内容 ====="
          ls -la "$BUNDLE_DIR/"
          
          # 重新打包 deb
          FIXED_DEB="${DEB_FILE%.deb}_fixed.deb"
          dpkg-deb -b "$REPACK_DIR" "$FIXED_DEB"
          
          # 替换原文件
          mv "$FIXED_DEB" "$DEB_FILE"
          echo "✅ deb 已重新打包"
          
          # 复制回工作目录
          mkdir -p "$GITHUB_WORKSPACE/tweak/packages"
          cp "$DEB_FILE" "$GITHUB_WORKSPACE/tweak/packages/"
          echo "deb 已复制回工作目录"
          
          # 验证最终 deb 内容
          echo "===== 验证最终 deb 内容 ====="
          dpkg-deb -c "$DEB_FILE" | grep -i 'preferencebundles\|preferenceloader'

      - name: 构建结果诊断
        if: always()
        run: |
          echo "===== 构建日志末尾 ====="
          tail -50 /Volumes/theos_build/build.log 2>/dev/null || echo "无构建日志"

      - name: 准备产物
        if: always()
        run: |
          mkdir -p artifacts/pc
          DEB_FILE=$(ls tweak/packages/*.deb 2>/dev/null | head -1)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" artifacts/ && echo "deb 已复制"
          else
            # 尝试从卷上复制
            DEB_FILE=$(ls /Volumes/theos_build/tweak/packages/*.deb 2>/dev/null | head -1)
            if [ -n "$DEB_FILE" ]; then
              cp "$DEB_FILE" artifacts/ && echo "deb 从卷复制"
            else
              echo "未找到 deb"
            fi
          fi
          cp pc/stream_client.py artifacts/pc/ 2>/dev/null || true
          cp pc/multi_client.py artifacts/pc/ 2>/dev/null || true
          cp pc/requirements.txt artifacts/pc/ 2>/dev/null || true
          if [ -f "/Volumes/theos_build/build.log" ]; then
            cp /Volumes/theos_build/build.log artifacts/
          elif [ -f "build.log" ]; then
            cp build.log artifacts/
          fi
          echo "===== 产物列表 ====="
          find artifacts/ -type f

      - name: 上传构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOSScreenStream
          path: artifacts/**
          if-no-files-found: warn

      - name: 卸载磁盘映像
        if: always()
        run: |
          hdiutil detach /Volumes/theos_build -force 2>/dev/null || true

  release:
    if: needs.build.result == 'success'
    needs: build
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(grep '^Version:' tweak/control | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: iOSScreenStream
          path: release-packages

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-build-${{ github.sha }}
          name: iOSScreenStream v${{ steps.version.outputs.version }}
          body: |
            iOSScreenStream 自动构建

            版本: ${{ steps.version.outputs.version }}
            提交: ${{ github.sha }}

            更新内容:
            - 修复设置页空白（PSListController → PSListItemsController）
            - 修复设置图标缺失（添加 icon@2x/@3x）
            - 修复 Info.plist 大小写问题（macOS CI 大小写不敏感导致）
            - 修复 TCP 控制通道方向
            - 修复 VideoEncoder NAL 解析
            - UDP 视频分包 + TCP 心跳保活
            - PC 端自动检测分辨率
          files: release-packages/**/*
          draft: false
          prerelease: false
